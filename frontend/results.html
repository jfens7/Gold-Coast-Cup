<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCC | Live Scores</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            background: #000; /* Dark mode looks better for scoreboards */
            color: white;
            margin: 0; 
            padding-bottom: 2rem;
        }
        .header {
            position: sticky;
            top: 0;
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #333;
            z-index: 100;
        }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 0.5px; }
        .live-badge { 
            background: #ff3b30; color: white; padding: 2px 8px; border-radius: 4px; 
            font-size: 0.8rem; vertical-align: text-bottom; margin-left: 8px; 
            animation: pulse 2s infinite; font-weight: bold;
        }
        .scoreboard { padding: 1rem; }
        .match-card { 
            background: #1c1c1e; 
            padding: 1.2rem; 
            margin-bottom: 1rem; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #333;
        }
        .players { font-size: 1.1rem; font-weight: 500; line-height: 1.5;}
        .vs { color: #8e8e93; font-size: 0.85rem; font-weight: normal; margin: 0 4px;}
        .score { font-size: 1.8rem; font-weight: 800; color: #0a84ff; text-align: right; min-width: 60px;}
        
        @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body>

<div class="header">
    <h1>Gold Coast Cup <span class="live-badge">● LIVE</span></h1>
</div>

<div class="scoreboard" id="scoreboard">
    </div>

<script>
    async function fetchScores() {
        try {
            const res = await fetch("http://127.0.0.1:5000/api/results");
            const matches = await res.json();
            const board = document.getElementById('scoreboard');
            board.innerHTML = ""; 
            
            matches.forEach(match => {
                board.innerHTML += `
                    <div class="match-card">
                        <div class="players">
                            <div>${match.p1}</div>
                            <div class="vs">vs</div>
                            <div>${match.p2}</div>
                        </div>
                        <div class="score">${match.score}</div>
                    </div>
                `;
            });
        } catch (e) {
            console.error("Waiting for server...");
        }
    }
    fetchScores();
    setInterval(fetchScores, 3000); // 3-second magic refresh
</script>
</body>
</html>
